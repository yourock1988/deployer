    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            #!/usr/bin/env bash -l
            export PATH=/home/postal404/.nvm/versions/node/v22.11.0/bin:$PATH
            set -e
            kill $(lsof -t -i :8181)
            cd app
            git pull
            npm ci
            npm run build
            npm prune --omit=dev
            npm start
            echo "Деплой успешно завершён!"
