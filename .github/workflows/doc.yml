name: doc
on: [push]
jobs:
  doc-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # - run: pwd

      # - run: git status

      # - run: docker -v

      # - name: Login to GHCR
      #   run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Set up Buildx is REQUIRED to use GitHub Actions cache backends
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/deployer:latest
          # Fetch cache from GitHub Actions backend
          cache-from: type=gha
          # Export cache back to GitHub Actions backend (mode=max catches intermediate stages)
          cache-to: type=gha,mode=max

